name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode signing keystore
        run: echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 --decode > my-release-key.jks

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: my-release-key.jks
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="${KEYSTORE_FILE}" \
            -Pandroid.injected.signing.store.password="${{ secrets.STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            --stacktrace --info

      - name: Show built APKs
        run: |
          echo "APK files found:"
          find app/build/outputs -type f -name "*.apk" || echo "No APKs"
          ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "No release folder"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: osc_1.9.2.2-signed
          path: app/build/outputs/apk/release/*.apk
